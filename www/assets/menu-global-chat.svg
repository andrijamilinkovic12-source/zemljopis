      <stop offset="1" stop-color="#11998e"/>
    </linearGradient>
    <linearGradient id="chat-gold" x1="31" y1="22" x2="72" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff7bf"/>
