<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" aria-hidden="true">
  <defs>
    <linearGradient id="chat-ring" x1="13" y1="8" x2="83" y2="89" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset=".48" stop-color="#38ef7d"/>
      <stop offset="1" stop-color="#f5af19"/>
    </linearGradient>
    <radialGradient id="chat-face" cx="39%" cy="30%" r="70%">
      <stop offset="0" stop-color="#123b42"/>
      <stop offset=".58" stop-color="#092127"/>
      <stop offset="1" stop-color="#041014"/>
    </radialGradient>
    <linearGradient id="chat-cyan" x1="20" y1="18" x2="75" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset=".5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#11998e"/>
    </linearGradient>
    <linearGradient id="chat-green" x1="23" y1="24" x2="72" y2="78" gradientUnits="userSpaceOnUse">
