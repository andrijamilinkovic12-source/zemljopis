  <circle cx="48" cy="48" r="33.5" fill="url(#chat-face)" stroke="#d9ffe8" stroke-opacity=".55" stroke-width="2"/>

  <g opacity=".52" fill="none" stroke="#7dd3fc" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
    <path d="M18.5 48h59"/>
    <path d="M48 16c-8.8 9.1-13.2 19.8-13.2 32S39.2 70.9 48 80"/>
