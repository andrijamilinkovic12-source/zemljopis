<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" aria-hidden="true">
  <defs>
    <linearGradient id="treasury-ring" x1="13" y1="8" x2="83" y2="89" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset=".48" stop-color="#38ef7d"/>
      <stop offset="1" stop-color="#f5af19"/>
    </linearGradient>
    <radialGradient id="treasury-face" cx="39%" cy="30%" r="70%">
