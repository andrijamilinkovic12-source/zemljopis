<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" aria-hidden="true">
  <defs>
    <linearGradient id="friends-ring" x1="13" y1="8" x2="83" y2="89" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset=".48" stop-color="#38ef7d"/>
      <stop offset="1" stop-color="#f5af19"/>
    </linearGradient>
    <radialGradient id="friends-face" cx="39%" cy="30%" r="70%">
      <stop offset="0" stop-color="#123b42"/>
      <stop offset=".58" stop-color="#092127"/>
      <stop offset="1" stop-color="#041014"/>
    </radialGradient>
    <linearGradient id="friends-book" x1="22" y1="20" x2="74" y2="77" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset=".52" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#11998e"/>
    </linearGradient>
    <linearGradient id="friends-gold" x1="31" y1="18" x2="70" y2="74" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff7bf"/>
      <stop offset=".42" stop-color="#ffe08a"/>
      <stop offset="1" stop-color="#f5af19"/>
    </linearGradient>
    <linearGradient id="friends-green" x1="26" y1="28" x2="68" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d9ffe8"/>
      <stop offset=".48" stop-color="#38ef7d"/>
      <stop offset="1" stop-color="#11998e"/>
    </linearGradient>
    <filter id="friends-shadow" x="-28%" y="-28%" width="156%" height="156%">
      <feDropShadow dx="0" dy="4" stdDeviation="3.2" flood-color="#000000" flood-opacity=".42"/>
    </filter>
    <filter id="friends-glow" x="-42%" y="-42%" width="184%" height="184%">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="48" cy="48" r="43" fill="#06151a" opacity=".92"/>
  <circle cx="48" cy="48" r="40.5" fill="none" stroke="url(#friends-ring)" stroke-width="5.5" filter="url(#friends-glow)"/>
  <circle cx="48" cy="48" r="33.5" fill="url(#friends-face)" stroke="#d9ffe8" stroke-opacity=".55" stroke-width="2"/>

  <g opacity=".32" fill="none" stroke="#7dd3fc" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
    <path d="M19 48h58"/>
    <path d="M48 16c-8.8 9.2-13.2 19.8-13.2 32S39.2 70.8 48 80"/>
    <path d="M48 16c8.8 9.2 13.2 19.8 13.2 32S56.8 70.8 48 80"/>
  </g>

  <g filter="url(#friends-shadow)">
    <rect x="23" y="24" width="50" height="55" rx="8" fill="url(#friends-book)" stroke="#d9ffe8" stroke-opacity=".72" stroke-width="2.5"/>
    <path d="M33 24v55" stroke="#06151a" stroke-opacity=".38" stroke-width="4"/>
    <path d="M29 34h-7M29 47h-7M29 60h-7" stroke="#f5af19" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g filter="url(#friends-glow)">
    <circle cx="50" cy="43" r="8" fill="url(#friends-gold)" stroke="#fff7bf" stroke-width="1.8"/>
    <path d="M36.5 68.5c2.4-9.2 8.1-13.8 13.5-13.8s11.1 4.6 13.5 13.8" fill="none" stroke="url(#friends-gold)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="63" cy="48" r="6" fill="url(#friends-green)" stroke="#d9ffe8" stroke-width="1.6"/>
    <path d="M54.5 68.5c1.7-6.7 5.4-10 8.5-10 3.3 0 6.8 3.4 8.4 10" fill="none" stroke="url(#friends-green)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <circle cx="72" cy="23" r="7" fill="#ff416c" stroke="#ffd1dc" stroke-width="1.5" filter="url(#friends-glow)"/>
  <path d="M72 19.7v6.6M68.7 23h6.6" stroke="#fff" stroke-width="2.1" stroke-linecap="round"/>
</svg>
